services:
  postgres:
    image: postgres:15-alpine
    container_name: fever_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fever_routing}
      POSTGRES_USER: ${POSTGRES_USER:-fever_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - fever_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fever_user} -d ${POSTGRES_DB:-fever_routing}"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: fever_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - fever_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: fever_backend
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-fever_user}:${POSTGRES_PASSWORD:-secure_password}@postgres:5432/${POSTGRES_DB:-fever_routing}
      - REDIS_URL=redis://redis:6379/0
      # На ВМ задайте CORS_ORIGINS в .env (например: http://IP:3000,http://domain.com)
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:80,http://127.0.0.1:80}
    ports:
      - "8000:8000"
    volumes:
      - ./data/exports:/app/exports
      - ./logs:/app/logs
    networks:
      - fever_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # На ВМ: оставьте пустым для relative URL (nginx проксирует /api/) или укажите полный URL бэкенда
      args:
        VITE_API_BASE_URL: ${FRONTEND_API_URL:-}
    container_name: fever_frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=${FRONTEND_API_URL:-}
      - VITE_ENABLE_DEBUG=${FRONTEND_DEBUG:-false}
    networks:
      - fever_network
    depends_on:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: fever_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - fever_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: fever_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    networks:
      - fever_network
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  fever_network:
    driver: bridge
